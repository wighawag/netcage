# goreleaser config for netcage: Linux-only binaries (the jail runs against a
# Linux kernel; on macOS/Windows that is the Podman machine VM / WSL2),
# static (CGO disabled) binaries covering amd64, arm64, and 32-bit ARM v7/v6 so
# older Raspberry Pi models are covered (Pi 1 / Zero = armv6, Pi 2 / 3 32-bit =
# armv7, Pi 3/4/5 64-bit = arm64).
version: 2

project_name: netcage

before:
  hooks:
    - go mod tidy

builds:
  - id: netcage
    main: .
    binary: netcage
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # Stamp the version with the release tag (e.g. v0.1.0 -> 0.1.0). When absent
      # (a plain go build / go install), main.resolveVersion falls back to the
      # module version + VCS revision from the build info.
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      # 32-bit ARM variants for older Raspberry Pi models.
      - "7" # Pi 2, Pi 3 (32-bit OS)
      - "6" # Pi 1, Pi Zero / Zero W

  # The in-jail DNS-to-SOCKS-TCP forwarder helper. netcage mounts it into the
  # redirector sidecar and execs it there (ADR-0003/0006); without it the jail
  # cannot run, so it MUST ship alongside the netcage binary. netcage finds it as
  # a sibling of its own executable, so the archive places both binaries side by
  # side. CGO_ENABLED=0 is LOAD-BEARING here: the helper executes inside the
  # musl-based sidecar image, which cannot load a glibc-dynamic binary.
  - id: netcage-dns
    main: ./cmd/netcage-dns
    binary: netcage-dns
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
      - "6"

archives:
  - id: netcage
    # Bundle BOTH binaries (netcage + netcage-dns) into one archive per target,
    # so a downloaded release runs the jail out of the box.
    ids:
      - netcage
      - netcage-dns
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - docs/adr/*.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  # Upload the installer as a standalone release asset, so it is served from
  # stable release object storage (no raw.githubusercontent branch-cache lag):
  #   curl -fsSL https://github.com/wighawag/netcage/releases/latest/download/install.sh | sh
  extra_files:
    - glob: ./install.sh
