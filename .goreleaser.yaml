# goreleaser config for netcage: Linux-only (the jail needs Linux netns/nft),
# static (CGO disabled) binaries covering amd64, arm64, and 32-bit ARM v7/v6 so
# older Raspberry Pi models are covered (Pi 1 / Zero = armv6, Pi 2 / 3 32-bit =
# armv7, Pi 3/4/5 64-bit = arm64).
version: 2

project_name: netcage

before:
  hooks:
    - go mod tidy

builds:
  - id: netcage
    main: .
    binary: netcage
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # Stamp the version with the release tag (e.g. v0.1.0 -> 0.1.0). When absent
      # (a plain go build / go install), main.resolveVersion falls back to the
      # module version + VCS revision from the build info.
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      # 32-bit ARM variants for older Raspberry Pi models.
      - "7" # Pi 2, Pi 3 (32-bit OS)
      - "6" # Pi 1, Pi Zero / Zero W

archives:
  - id: netcage
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - docs/adr/*.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
