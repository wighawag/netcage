name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# goreleaser cross-compiles the Linux binaries (amd64, arm64, armv7, armv6 for
# older Raspberry Pi models), builds the archives + checksums, and publishes them
# to the GitHub Release for the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run unit tests
        # Unit tests only. The jail/verify integration tests are behind the
        # `integration` build tag because they need a host with rootless
        # podman + pasta + /dev/net/tun, which GitHub runners lack. Run them on
        # a capable host with `go test -tags integration ./...`.
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
